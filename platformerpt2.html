<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Platformer Game</title>
<style>
  canvas {
    border: 1px solid black;
    display: block;
    margin: 0 auto;
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
// Basic game setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Sample player object
const player = {
  x: 50,
  y: 300,
  width: 30,
  height: 50,
  color: 'blue'
};

// Sample platforms array
const platforms = [
  { x: 0, y: 350, width: 100, height: 10 },
  { x: 150, y: 300, width: 100, height: 10 },
  { x: 300, y: 250, width: 100, height: 10 },
  { x: 450, y: 200, width: 100, height: 10 },
  { x: 600, y: 150, width: 100, height: 10 }
];

// Array for collectables
const collectables = [];

// Function to create collectables
function createCollectable(type, x, y, gravity=0, bounce=0) {
  collectables.push({ type, x, y, gravity, bounce });
}

// Add your collectables
createCollectable("diamond", 100, 150, 0.5, 0.7);
createCollectable("max", 400, 100, 0.3, 0.5);
createCollectable("steve", 700, 200, 0, 0);

// Game loop to draw everything
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw player
  ctx.fillStyle = player.color;
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // Draw platforms
  ctx.fillStyle = 'gray';
  platforms.forEach(p => {
    ctx.fillRect(p.x, p.y, p.width, p.height);
  });

  // Draw collectables
  collectables.forEach(c => {
    ctx.fillStyle = {
      "diamond": "cyan",
      "max": "gold",
      "steve": "red"
    }[c.type] || "black";
    ctx.beginPath();
    ctx.arc(c.x, c.y, 10, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

// Start drawing
draw();

</script>
</body>
</html>
